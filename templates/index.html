<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <title> ElephantChat </title>
    </head>
    <body
        class="relative min-h-screen bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 flex items-center justify-center p-5"
    >
        <div
            class="bg-white rounded-3xl shadow-2xl p-12 md:p-16 text-center max-w-2xl w-full"
        >
            <div class="text-8xl mb-6 animate-bounce">🐘</div>

            <h1 class="text-5xl md:text-6xl font-bold text-gray-800 mb-6">
                ElephantChat
            </h1>

            <p class="text-xl text-gray-600 mb-4 leading-relaxed">
                Welcome to ElephantChat!
            </p>

            <p class="text-lg text-gray-500 mb-10 leading-relaxed">
                Your Django application is up and running successfully!
            </p>

            <div class="">
                {# TODO: Redirect to chatbot app #}
                <a id="catch-me" class="bg-indigo-400 p-2 rounded-md text-indigo-800 absolute transition-all" href="index">
                    Click me to continue
                </a>
            </div>
        </div>
    <script type="application/javascript">
        const repetitions = 3
        const button = document.getElementById("catch-me")
        const origin = button.getBoundingClientRect()
        let counter = 0

        button.addEventListener(
            'mouseover',
            () => counter <= repetitions ? catchMe() : returnToOrigin()
        );

        const catchMe = () => {
            const current = button.getBoundingClientRect()
            const maxX = window.innerWidth - current.width
            const maxY = window.innerHeight - current.height

            //        [0,1] * [screen size] - origin offset (translate is relative to button original position)
            const x = Math.floor(Math.random() * maxX) - origin.left
            const y = Math.floor(Math.random() * maxY) - origin.top

            button.style.transform = `translate(${x}px,${y}px)`
            button.innerHTML = `Catch Me [${counter} / ${repetitions}]`
            counter += repetitions
        }

        const returnToOrigin = () => {
            button.style.transform = `translate(0px, 0px)`
            button.innerHTML = `Okay, now you can click on me`
        }

    </script>
    </body>
</html>
